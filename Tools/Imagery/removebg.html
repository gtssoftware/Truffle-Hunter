<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulk Pixel Color Remover</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background: #eee;
}

canvas {
    max-width: 80%;
    border: 2px solid #333;
    margin: 15px;
    cursor: crosshair;
}

button, input {
    padding: 10px;
    margin: 10px;
}

#preview {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.thumb {
    margin: 10px;
}
</style>
</head>

<body>

<h2>opaque bg go bye bye</h2>

<input type="file" id="files" accept="image/*" multiple>

<p>
select color to remove dummy
</p>

<canvas id="canvas"></canvas>

<br>

<button id="process" disabled>
Process All Images
</button>

<button id="downloadAll" disabled>
Download ZIP
</button>

<div id="preview"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const fileInput = document.getElementById("files");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const processBtn = document.getElementById("process");
const downloadBtn = document.getElementById("downloadAll");
const preview = document.getElementById("preview");

let images = [];
let selectedColor = null;
let results = [];


fileInput.addEventListener("change", async e => {

    images = [];

    for (const file of e.target.files) {

        const img = new Image();

        await new Promise(resolve => {

            img.onload = () => resolve();
            img.src = URL.createObjectURL(file);

        });

        images.push({
            name: file.name,
            img: img
        });
    }


    if(images.length){

        canvas.width = images[0].img.width;
        canvas.height = images[0].img.height;

        ctx.drawImage(
            images[0].img,
            0,
            0
        );

        processBtn.disabled = false;

    }

});


canvas.addEventListener("click", e => {

    const rect = canvas.getBoundingClientRect();

    const x = Math.floor(
        (e.clientX - rect.left)
        * canvas.width
        / rect.width
    );

    const y = Math.floor(
        (e.clientY - rect.top)
        * canvas.height
        / rect.height
    );


    const pixel =
        ctx.getImageData(x,y,1,1).data;


    selectedColor = {
        r: pixel[0],
        g: pixel[1],
        b: pixel[2]
    };


    alert(
        `Selected RGB(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`
    );

});


processBtn.addEventListener("click", async ()=>{

    if(!selectedColor){
        alert("Pick a color first");
        return;
    }


    results = [];
    preview.innerHTML="";


    for(const item of images){

        const c = document.createElement("canvas");
        const cctx = c.getContext("2d");

        c.width=item.img.width;
        c.height=item.img.height;

        cctx.drawImage(item.img,0,0);


        let data =
        cctx.getImageData(
            0,
            0,
            c.width,
            c.height
        );


        for(let i=0;i<data.data.length;i+=4){

            if(
                data.data[i] === selectedColor.r &&
                data.data[i+1] === selectedColor.g &&
                data.data[i+2] === selectedColor.b
            ){
                data.data[i+3]=0;
            }

        }


        cctx.putImageData(data,0,0);


        let blob =
        await new Promise(resolve =>
            c.toBlob(resolve,"image/png")
        );


        results.push({
            name:item.name.replace(/\.[^/.]+$/,"")+".png",
            blob:blob
        });


        let img=document.createElement("img");
        img.src=URL.createObjectURL(blob);
        img.width=150;
        img.className="thumb";

        preview.appendChild(img);

    }


    downloadBtn.disabled=false;

});



downloadBtn.addEventListener("click", async()=>{

    const zip=new JSZip();


    for(const file of results){

        zip.file(
            file.name,
            file.blob
        );

    }


    const content =
    await zip.generateAsync({
        type:"blob"
    });


    const link=document.createElement("a");

    link.href=
    URL.createObjectURL(content);

    link.download="transparent_images.zip";

    link.click();

});

</script>

</body>
</html>
